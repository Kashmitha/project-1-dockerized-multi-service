services:
  backend:
    build: ./backend
    container_name: devops-backend
    ports:
      - "5000:5000"
    networks:
      - devops-network
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: devops-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - devops-network
    restart: unless-stopped

networks:
  devops-network:
    driver: bridge
